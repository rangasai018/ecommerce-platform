<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        E-Shop
    </div>

    <a href="home.html">
        <button>Home</button>
    </a>

</nav>

<div class="cart-container">

    <h1>Your Cart</h1>

    <div class="cart-item">
        <h3>Laptop</h3>
        <p>₹50,000</p>
    </div>

    <div class="cart-item">
        <h3>Headphones</h3>
        <p>₹2,000</p>
    </div>

    <hr>

    <div class="cart-summary">

        <p><strong>Total Items:</strong> 2</p>

        <p><strong>Delivery:</strong> Free</p>

        <p><strong>Discount:</strong> ₹1,000</p>

        <h2>Total: ₹51,000</h2>

    </div>

    <button class="cart-btn">
        Checkout
    </button>

    <br><br>

    <a href="home.html">
        <button class="cart-btn">
            Continue Shopping
        </button>
    </a>

</div>

</body>
</html>
