<!DOCTYPE html>
<html>
<head>
    <title>E-Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">

        <div class="logo">
            E-Shop
        </div>

        <input
            type="text"
            placeholder="Search products..."
            class="search-bar"
        >

        <div class="nav-buttons">

            <a href="login.html">
                <button>Customer Login</button>
            </a>

            <a href="seller-login.html">
                <button>Seller Login</button>
            </a>

            <button>🛒 Cart</button>

        </div>

    </nav>

    <section class="hero">

        <h1>Welcome to E-Shop</h1>

        <p>
            Buy and Sell Products Easily
        </p>

        <button class="shop-btn">
            Shop Now
        </button>

    </section>

    <section class="categories">
        
        <h2>Shop By Category</h2>
        
        <div class="category-grid">
            
            <div class="category-card">
                📱 Electronics
            </div>
            <div class="category-card">
                👕 Fashion
            </div>
            <div class="category-card">
                📚 Books
            </div>
            <div class="category-card">
                🏠 Home
            </div>

        </div>

    </div>

</section>

    <section class="products">

        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="card">

                <img
                    src="https://via.placeholder.com/200x150"
                    alt="Laptop"
                >

                <h3>Laptop</h3>

                <p class="price">
                    ₹50,000
                </p>

                <button class="cart-btn">
                    Add To Cart
                </button>

            </div>

            <div class="card">

                <img
                    src="https://via.placeholder.com/200x150"
                    alt="Mobile"
                >

                <h3>Mobile</h3>

                <p class="price">
                    ₹20,000
                </p>

                <button class="cart-btn">
                    Add To Cart
                </button>

            </div>

            <div class="card">

                <img
                    src="https://via.placeholder.com/200x150"
                    alt="Headphones"
                >

                <h3>Headphones</h3>

                <p class="price">
                    ₹2,000
                </p>

                <button class="cart-btn">
                    Add To Cart
                </button>

            </div>

            <div class="card">

                <img
                    src="https://via.placeholder.com/200x150"
                    alt="Smart Watch"
                >

                <h3>Smart Watch</h3>

                <p class="price">
                    ₹5,000
                </p>

                <button class="cart-btn">
                    Add To Cart
                </button>

            </div>

        </div>

    </section>

    <footer>
        <h3>E-Shop</h3>

        <p>Your One-Stop Online Shopping Destination</p>
        
        <p>© 2026 E-Shop. All Rights Reserved.</p>
    </footer>

</body>
</html>
