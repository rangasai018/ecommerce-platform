<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">E-Shop</div>

        <input type="text" placeholder="Search products..." class="search-bar">

        <div class="nav-buttons">
            <a href="login.html">
                <button>Customer Login</button>
            </a>
            <a href="seller-login.html">
                <button>Seller Login</button>
            </a>
            <button>🛒 Cart</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Welcome to E-Shop</h1>
        <p>Buy and Sell Products Easily</p>
        <button class="shop-btn">Shop Now</button>
    </section>

    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="card">
                <h3>Laptop</h3>
                <p>₹50,000</p>
            </div>

            <div class="card">
                <h3>Mobile</h3>
                <p>₹20,000</p>
            </div>

            <div class="card">
                <h3>Headphones</h3>
                <p>₹2,000</p>
            </div>

            <div class="card">
                <h3>Smart Watch</h3>
                <p>₹5,000</p>
            </div>

        </div>
    </section>

    <footer>
        <p>© 2026 E-Shop. All Rights Reserved.</p>
    </footer>

</body>
</html>
