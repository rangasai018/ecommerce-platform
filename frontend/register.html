<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>E-Shop</h1>

        <h2>Create Account</h2>

        <input
            type="text"
            id="name"
            placeholder="Enter Name"
        >

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button
            class="auth-btn"
            id="registerBtn"
        >
            Register
        </button>

        <p id="message"></p>

        <p class="welcome-text">
            Join E-Shop and start shopping today
        </p>

        <p>
            Create an account to explore products,
            manage orders, and enjoy a seamless
            shopping experience.
        </p>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

        <br>

        <a href="index.html">
            ← Back to Home
        </a>

    </div>

</div>

<script>

document.getElementById("registerBtn").addEventListener("click", async () => {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const message = document.getElementById("message");

    if (!name || !email || !password) {

        message.style.color = "red";
        message.innerText = "Please fill all fields.";
        return;

    }

    try {

        const response = await fetch(
            "https://ecommerce-backend-vnw2.onrender.com/auth/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name,
                    email,
                    password
                })
            }
        );

        const result = await response.text();

        if (result === "Email already registered") {

            message.style.color = "red";
            message.innerText = result;

        } else {

            message.style.color = "green";
            message.innerText = "Registration Successful!";

            setTimeout(() => {

                window.location.href = "login.html";

            }, 1200);

        }

    } catch (error) {

        console.error(error);

        message.style.color = "red";
        message.innerText = "Unable to connect to server.";

    }

});

</script>

</body>
</html>
